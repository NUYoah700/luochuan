name: 洛川每日抓取

on:
  schedule:
    # 北京时间 06:00 = UTC 22:00
    - cron: '0 22 * * *'
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 写入配置
        run: echo '${{ secrets.LUOCHUAN_CONFIG }}' > config.json

      - name: 运行抓取
        run: python scraper.py
