<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洛川</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f7;
    --card-bg: #ffffff;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-muted: #a1a1a6;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --border: #e6e6e6;
    --shadow-light: 0 2px 8px rgba(0, 0, 0, 0.04);
    --shadow-medium: 0 4px 20px rgba(0, 0, 0, 0.08);
    --radius: 16px;
    --radius-sm: 10px;
    --transition: 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
      "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
    background: var(--bg);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    color: var(--text-primary);
  }

  .app { 
    max-width: 430px; 
    margin: 0 auto; 
    padding: 0 20px 100px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 0 20px;
    position: sticky;
    top: 0;
    background: rgba(245, 245, 247, 0.95);
    backdrop-filter: blur(20px);
    z-index: 100;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  .brand-logo {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #000000 0%, #333333 100%);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
  }

  .brand-name {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--text-primary);
  }

  .header-right {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .header-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
  }
  .header-btn:hover { background: rgba(0, 0, 0, 0.05); }

  /* ── Stats ── */
  .stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 12px 0 24px;
  }
  .stat-item {
    text-align: center;
  }
  .stat-value {
    font-size: 24px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1;
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── Card Container ── */
  .card-stack {
    position: relative;
    height: 520px;
    margin-bottom: 24px;
  }

  /* ── Card ── */
  .card {
    position: absolute;
    width: 100%;
    height: 100%;
    background: var(--card-bg);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: grab;
    user-select: none;
    transition: var(--transition);
    box-shadow: var(--shadow-medium);
    border: 1px solid rgba(0, 0, 0, 0.04);
  }
  .card:active { cursor: grabbing; }
  .card.is-dragging { transition: none; }
  .card.animating { transition: transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.5s; }

  /* Card Image */
  .card-image {
    width: 100%;
    height: 60%;
    background-size: cover;
    background-position: center;
  }

  /* Card Content */
  .card-content {
    padding: 24px;
    height: 40%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
  }

  .card-source {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-source-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .card-source-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .card-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--bg);
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .card-title {
    font-size: 20px;
    font-weight: 600;
    line-height: 1.35;
    color: var(--text-primary);
    margin-bottom: 8px;
    flex: 1;
  }

  .card-summary {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-secondary);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
  }

  .card-meta {
    display: flex;
    gap: 10px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .card-meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-time {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* No Image Placeholder */
  .card-no-image {
    width: 100%;
    height: 60%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    background: linear-gradient(135deg, #f8f8fa 0%, #e8e8ed 100%);
  }
  .card-no-image-icon {
    font-size: 56px;
    opacity: 0.3;
  }
  .card-no-image-text {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* Swipe Overlays */
  .card-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .card-overlay.like {
    background: rgba(0, 113, 227, 0.12);
  }
  .card-overlay.nope {
    background: rgba(237, 66, 69, 0.12);
  }
  .card-overlay-label {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 12px 32px;
    border-radius: 10px;
    border: 4px solid;
    transform: rotate(-15deg);
  }
  .card-overlay.like .card-overlay-label {
    color: var(--accent);
    border-color: var(--accent);
  }
  .card-overlay.nope .card-overlay-label {
    color: #ed4245;
    border-color: #ed4245;
  }

  /* ── Action Buttons ── */
  .actions {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 8px 0;
  }

  .action-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    transition: var(--transition);
    background: var(--card-bg);
    box-shadow: var(--shadow-light);
  }
  .action-btn:hover {
    transform: scale(1.1);
  }
  .action-btn.nope {
    color: #ed4245;
    border: 2px solid #ed4245;
  }
  .action-btn.nope:hover {
    background: #ed4245;
    color: #fff;
  }
  .action-btn.super {
    width: 44px;
    height: 44px;
    color: #ffd60a;
    border: 2px solid #ffd60a;
    font-size: 18px;
  }
  .action-btn.super:hover {
    background: #ffd60a;
    color: #fff;
  }
  .action-btn.like {
    color: var(--accent);
    border: 2px solid var(--accent);
  }
  .action-btn.like:hover {
    background: var(--accent);
    color: #fff;
  }

  /* ── Empty State ── */
  .empty-state {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 56px 32px;
    text-align: center;
    box-shadow: var(--shadow-medium);
    border: 1px solid rgba(0, 0, 0, 0.04);
  }
  .empty-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.2; }
  .empty-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .empty-desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .empty-btn {
    padding: 12px 32px;
    border-radius: 24px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    font-family: inherit;
  }
  .empty-btn:hover { background: var(--accent-hover); }

  /* ── Onboarding Modal ── */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(10px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    visibility: hidden;
    transition: var(--transition);
  }
  .modal-overlay.show {
    opacity: 1;
    visibility: visible;
  }
  .modal {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 40px 32px 32px;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.2);
    transform: scale(0.95) translateY(10px);
    transition: var(--transition);
  }
  .modal-overlay.show .modal {
    transform: scale(1) translateY(0);
  }
  .modal-header {
    text-align: center;
    margin-bottom: 28px;
  }
  .modal-logo {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #000 0%, #333 100%);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    margin: 0 auto 16px;
  }
  .modal-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .modal-desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .modal-steps {
    margin-bottom: 28px;
  }
  .modal-step {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    margin-bottom: 12px;
  }
  .modal-step-num {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .modal-step-text {
    font-size: 14px;
    color: var(--text-primary);
    font-weight: 500;
  }
  .modal-interests {
    margin-bottom: 24px;
  }
  .interests-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .interests-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .interest-chip {
    padding: 12px 8px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: transparent;
    text-align: center;
    cursor: pointer;
    transition: var(--transition);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
  }
  .interest-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .interest-chip.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .interest-chip .emoji {
    font-size: 20px;
    display: block;
    margin-bottom: 4px;
  }
  .modal-btn-primary {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    font-family: inherit;
  }
  .modal-btn-primary:hover {
    background: var(--accent-hover);
  }
  .modal-btn-secondary {
    width: 100%;
    padding: 12px;
    border-radius: 14px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    font-family: inherit;
    margin-top: 8px;
  }
  .modal-btn-secondary:hover {
    color: var(--text-primary);
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 32px 0 0;
    color: var(--text-muted);
    font-size: 12px;
  }

  @media (max-width: 480px) {
    .app { padding: 0 16px 80px; }
    .card-stack { height: 480px; }
    .card-title { font-size: 18px; }
    .action-btn { width: 52px; height: 52px; font-size: 22px; }
    .action-btn.super { width: 40px; height: 40px; font-size: 16px; }
    .interests-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="brand">
      <div class="brand-logo">洛</div>
      <div class="brand-name">洛川</div>
    </div>
    <div class="header-right">
      <button class="header-btn" onclick="showPreferences()">⚙️</button>
    </div>
  </header>

  <div class="stats">
    <div class="stat-item">
      <div class="stat-value" id="stat-liked">0</div>
      <div class="stat-label">Liked</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stat-remaining">0</div>
      <div class="stat-label">Left</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stat-nope">0</div>
      <div class="stat-label">Passed</div>
    </div>
  </div>

  <div class="card-stack" id="cardStack">
    <div class="card" id="card">
      <div class="card-overlay like" id="overlayLike">
        <div class="card-overlay-label">LIKE</div>
      </div>
      <div class="card-overlay nope" id="overlayNope">
        <div class="card-overlay-label">PASS</div>
      </div>
      
      <div class="card-no-image" id="cardNoImage">
        <div class="card-no-image-icon">📰</div>
        <div class="card-no-image-text">加载中...</div>
      </div>
      <div class="card-image" id="cardImage" style="display:none;"></div>
      
      <div class="card-content">
        <div>
          <div class="card-top">
            <div class="card-source">
              <div class="card-source-icon" id="cardSourceIcon">📰</div>
              <div class="card-source-name" id="cardSource">来源</div>
            </div>
            <div class="card-tag" id="cardTag">热门</div>
          </div>
          <div class="card-title" id="cardTitle">标题加载中...</div>
          <div class="card-summary" id="cardSummary">摘要内容...</div>
        </div>
        <div class="card-bottom">
          <div class="card-meta" id="cardMeta">
            <span class="card-meta-item">📍 全球</span>
          </div>
          <div class="card-time" id="cardTime">刚刚</div>
        </div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="action-btn nope" onclick="handleSwipe('nope')">✕</button>
    <button class="action-btn super" onclick="handleSwipe('super')">★</button>
    <button class="action-btn like" onclick="handleSwipe('like')">♥</button>
  </div>

  <div class="footer">每日清晨 06:00 自动更新</div>
</div>

<!-- Onboarding Modal -->
<div class="modal-overlay" id="onboardingModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-logo">洛</div>
      <div class="modal-title">欢迎使用洛川</div>
      <div class="modal-desc">发现值得关注的资讯，让阅读更高效</div>
    </div>
    
    <div class="modal-steps">
      <div class="modal-step">
        <div class="modal-step-num">1</div>
        <div class="modal-step-text">向右滑动，标记喜欢的内容</div>
      </div>
      <div class="modal-step">
        <div class="modal-step-num">2</div>
        <div class="modal-step-text">向左滑动，跳过不感兴趣的</div>
      </div>
      <div class="modal-step">
        <div class="modal-step-num">3</div>
        <div class="modal-step-text">AI 会学习你的喜好，越用越懂你</div>
      </div>
    </div>
    
    <div class="modal-interests">
      <div class="interests-title">选择你的兴趣</div>
      <div class="interests-grid" id="interestsGrid">
        <div class="interest-chip" data-interest="money"><span class="emoji">💰</span>赚钱</div>
        <div class="interest-chip" data-interest="ai"><span class="emoji">🤖</span>AI</div>
        <div class="interest-chip" data-interest="career"><span class="emoji">💼</span>职场</div>
        <div class="interest-chip" data-interest="tech"><span class="emoji">🚀</span>科技</div>
        <div class="interest-chip" data-interest="trend"><span class="emoji">🔮</span>趋势</div>
        <div class="interest-chip" data-interest="life"><span class="emoji">🎯</span>生活</div>
      </div>
    </div>
    
    <button class="modal-btn-primary" onclick="completeOnboarding()">开始使用</button>
    <button class="modal-btn-secondary" onclick="skipOnboarding()">稍后选择</button>
  </div>
</div>

<script>
const DATA_DIR = './data/';

let allArticles = [];
let currentIndex = 0;
let likedCount = 0;
let nopeCount = 0;
let userPreferences = {};
let isDragging = false;
let startX = 0, startY = 0, currentX = 0, currentY = 0;
let cardEl;

const SOURCE_ICONS = {
  '抖音': '🎵', 'B站': '📺', '快手': '🎬',
  '36氪': '💼', '虎嗅': '🐯', '知乎': '💬',
  '少数派': '✌️', '创业邦': '🚀', '机器之心': '🧠',
  '量子位': '⚛️', 'Hacker News': '🔶', 'Reddit': '🤖'
};

function classifyTag(article) {
  const text = (article.title + ' ' + (article.summary || '') + ' ' + (article.category || '')).toLowerCase();
  
  if (text.includes('钱') || text.includes('赚') || text.includes('创业')) return '赚钱';
  if (text.includes('ai') || text.includes('人工智能')) return 'AI';
  if (text.includes('职场') || text.includes('工作')) return '职场';
  if (text.includes('科技') || text.includes('技术')) return '科技';
  if (text.includes('趋势') || text.includes('未来')) return '趋势';
  return '资讯';
}

function loadPreferences() {
  try {
    const saved = localStorage.getItem('luochuan_prefs');
    if (saved) {
      userPreferences = JSON.parse(saved);
      return true;
    }
  } catch (e) { console.error('加载偏好失败:', e); }
  return false;
}

function savePreferences() {
  try {
    localStorage.setItem('luochuan_prefs', JSON.stringify(userPreferences));
  } catch (e) { console.error('保存偏好失败:', e); }
}

function updateStats() {
  document.getElementById('stat-liked').textContent = likedCount;
  document.getElementById('stat-nope').textContent = nopeCount;
  document.getElementById('stat-remaining').textContent = Math.max(0, allArticles.length - currentIndex);
}

async function init() {
  loadPreferences();
  
  if (!userPreferences.onboarding_complete) {
    showOnboarding();
    loadArticles();
    return;
  }
  
  await loadArticles();
  setupSwipeCard();
  updateStats();
  showCurrentCard();
}

function showOnboarding() {
  const modal = document.getElementById('onboardingModal');
  modal.classList.add('show');
  
  document.querySelectorAll('.interest-chip').forEach(chip => {
    chip.addEventListener('click', () => chip.classList.toggle('selected'));
  });
}

function completeOnboarding() {
  const selected = Array.from(document.querySelectorAll('.interest-chip.selected'))
    .map(chip => chip.dataset.interest);
  
  userPreferences = {
    onboarding_complete: true,
    interests: selected,
    liked_articles: [],
    disliked_articles: [],
    topic_weights: {},
    last_update: new Date().toISOString()
  };
  
  selected.forEach(topic => userPreferences.topic_weights[topic] = 0.8);
  
  savePreferences();
  document.getElementById('onboardingModal').classList.remove('show');
  
  if (allArticles.length === 0) {
    loadArticles().then(() => { setupSwipeCard(); updateStats(); showCurrentCard(); });
  } else {
    setupSwipeCard(); updateStats(); showCurrentCard();
  }
}

function skipOnboarding() {
  userPreferences = {
    onboarding_complete: true,
    interests: [],
    liked_articles: [],
    disliked_articles: [],
    topic_weights: {},
    last_update: new Date().toISOString()
  };
  
  savePreferences();
  document.getElementById('onboardingModal').classList.remove('show');
  
  if (allArticles.length === 0) {
    loadArticles().then(() => { setupSwipeCard(); updateStats(); showCurrentCard(); });
  } else {
    setupSwipeCard(); updateStats(); showCurrentCard();
  }
}

async function loadArticles() {
  try {
    const resp = await fetch(`${DATA_DIR}index.json`);
    if (!resp.ok) throw new Error('index not found');
    const dates = (await resp.json()).reverse();
    
    allArticles = [];
    
    for (const entry of dates.slice(0, 3)) {
      try {
        const dateResp = await fetch(`${DATA_DIR}${entry.date}.json`);
        if (dateResp.ok) {
          const data = await dateResp.json();
          allArticles.push(...(data.articles || []));
        }
      } catch (e) { console.error(`加载 ${entry.date} 失败:`, e); }
    }
    
    if (allArticles.length === 0) allArticles = generateSampleArticles();
    
    allArticles = filterByPreferences(allArticles);
    allArticles = shuffleArray(allArticles);
    
  } catch (e) {
    console.error('加载文章失败:', e);
    allArticles = generateSampleArticles();
  }
}

function filterByPreferences(articles) {
  if (!userPreferences.interests || userPreferences.interests.length === 0) return articles;
  
  const weights = userPreferences.topic_weights || {};
  articles.sort((a, b) => {
    const tagA = classifyTag(a);
    const tagB = classifyTag(b);
    const weightA = weights[tagA] || 0.5;
    const weightB = weights[tagB] || 0.5;
    return weightB - weightA;
  });
  
  return articles;
}

function shuffleArray(array) {
  const shuffled = [...array];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}

function setupSwipeCard() {
  cardEl = document.getElementById('card');
  
  cardEl.addEventListener('mousedown', handleStart);
  cardEl.addEventListener('touchstart', handleStart, { passive: false });
  
  document.addEventListener('mousemove', handleMove);
  document.addEventListener('touchmove', handleMove, { passive: false });
  
  document.addEventListener('mouseup', handleEnd);
  document.addEventListener('touchend', handleEnd);
}

function handleStart(e) {
  isDragging = true;
  const point = e.touches ? e.touches[0] : e;
  startX = point.clientX;
  startY = point.clientY;
  currentX = 0;
  currentY = 0;
  
  cardEl.classList.add('is-dragging');
  cardEl.classList.remove('animating');
}

function handleMove(e) {
  if (!isDragging) return;
  
  e.preventDefault();
  const point = e.touches ? e.touches[0] : e;
  currentX = point.clientX - startX;
  currentY = point.clientY - startY;
  
  const rotation = currentX * 0.04;
  cardEl.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotation}deg)`;
  
  const overlayLike = document.getElementById('overlayLike');
  const overlayNope = document.getElementById('overlayNope');
  
  if (currentX > 60) {
    overlayLike.style.opacity = Math.min(currentX / 150, 1);
    overlayNope.style.opacity = 0;
  } else if (currentX < -60) {
    overlayNope.style.opacity = Math.min(Math.abs(currentX) / 150, 1);
    overlayLike.style.opacity = 0;
  } else {
    overlayLike.style.opacity = 0;
    overlayNope.style.opacity = 0;
  }
}

function handleEnd() {
  if (!isDragging) return;
  
  isDragging = false;
  cardEl.classList.remove('is-dragging');
  cardEl.classList.add('animating');
  
  if (currentX > 120) {
    animateSwipe('like');
  } else if (currentX < -120) {
    animateSwipe('nope');
  } else {
    resetCard();
  }
}

function animateSwipe(direction) {
  const targetX = direction === 'like' ? window.innerWidth : -window.innerWidth;
  const rotation = direction === 'like' ? 30 : -30;
  
  cardEl.style.transform = `translate(${targetX}px, ${currentY}px) rotate(${rotation}deg)`;
  cardEl.style.opacity = '0';
  
  setTimeout(() => {
    handleSwipe(direction);
    cardEl.style.opacity = '1';
  }, 300);
}

function resetCard() {
  cardEl.style.transform = 'translate(0, 0) rotate(0deg)';
  document.getElementById('overlayLike').style.opacity = 0;
  document.getElementById('overlayNope').style.opacity = 0;
}

function handleSwipe(direction) {
  if (currentIndex >= allArticles.length) {
    showEndState();
    return;
  }
  
  const article = allArticles[currentIndex];
  const tag = classifyTag(article);
  
  if (direction === 'like') {
    likedCount++;
    if (!userPreferences.liked_articles) userPreferences.liked_articles = [];
    userPreferences.liked_articles.push({ id: article.id || article.title, tag, timestamp: new Date().toISOString() });
    
    if (!userPreferences.topic_weights) userPreferences.topic_weights = {};
    userPreferences.topic_weights[tag] = Math.min((userPreferences.topic_weights[tag] || 0.5) + 0.1, 1.0);
  } else if (direction === 'nope') {
    nopeCount++;
    if (!userPreferences.disliked_articles) userPreferences.disliked_articles = [];
    userPreferences.disliked_articles.push({ id: article.id || article.title, tag, timestamp: new Date().toISOString() });
    
    if (!userPreferences.topic_weights) userPreferences.topic_weights = {};
    userPreferences.topic_weights[tag] = Math.max((userPreferences.topic_weights[tag] || 0.5) - 0.05, 0.1);
  }
  
  userPreferences.last_update = new Date().toISOString();
  savePreferences();
  
  currentIndex++;
  updateStats();
  
  if (currentIndex >= allArticles.length) {
    showEndState();
  } else {
    showCurrentCard();
  }
}

function showCurrentCard() {
  if (currentIndex >= allArticles.length) {
    showEndState();
    return;
  }
  
  const article = allArticles[currentIndex];
  const tag = classifyTag(article);
  const sourceIcon = SOURCE_ICONS[article.source] || '📰';
  
  // Source
  document.getElementById('cardSource').textContent = article.source || '资讯';
  document.getElementById('cardSourceIcon').textContent = sourceIcon;
  
  // Tag
  document.getElementById('cardTag').textContent = tag;
  
  // Title & Summary
  document.getElementById('cardTitle').textContent = article.title;
  document.getElementById('cardSummary').textContent = article.summary || article.summary_cn || '暂无摘要';
  
  // Meta
  document.getElementById('cardMeta').innerHTML = `
    <span class="card-meta-item">📍 ${article.region || '全球'}</span>
  `;
  document.getElementById('cardTime').textContent = '刚刚';
  
  // Image
  const cardImage = document.getElementById('cardImage');
  const cardNoImage = document.getElementById('cardNoImage');
  
  if (article.image) {
    cardImage.style.backgroundImage = `url(${article.image})`;
    cardImage.style.display = 'block';
    cardNoImage.style.display = 'none';
  } else {
    const emoji = getContentEmoji(article);
    cardNoImage.innerHTML = `
      <div class="card-no-image-icon">${emoji}</div>
      <div class="card-no-image-text">${tag}</div>
    `;
    cardNoImage.style.display = 'flex';
    cardImage.style.display = 'none';
  }
  
  // Reset
  cardEl.style.transform = 'translate(0, 0) rotate(0deg)';
  document.getElementById('overlayLike').style.opacity = 0;
  document.getElementById('overlayNope').style.opacity = 0;
  
  // Click to open URL
  cardEl.onclick = () => {
    if (article.url && article.url !== '#') {
      window.open(article.url, '_blank');
    }
  };
}

function getContentEmoji(article) {
  const text = (article.title + ' ' + (article.category || '')).toLowerCase();
  
  if (text.includes('钱') || text.includes('赚') || text.includes('创业')) return '💰';
  if (text.includes('ai') || text.includes('人工智能')) return '🤖';
  if (text.includes('职场') || text.includes('工作')) return '💼';
  if (text.includes('视频') || text.includes('抖音') || text.includes('b站')) return '📺';
  if (text.includes('科技') || text.includes('技术')) return '🚀';
  
  return '📰';
}

function showEndState() {
  const stack = document.getElementById('cardStack');
  stack.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">🎉</div>
      <div class="empty-title">今日内容已浏览完毕</div>
      <div class="empty-desc">
        喜欢 ${likedCount} 条 · 跳过 ${nopeCount} 条<br>
        明天早上6点有新内容哦
      </div>
      <button class="empty-btn" onclick="resetSwipe()">重新浏览</button>
    </div>
  `;
  
  document.querySelector('.actions').style.display = 'none';
}

function resetSwipe() {
  currentIndex = 0;
  likedCount = 0;
  nopeCount = 0;
  location.reload();
}
