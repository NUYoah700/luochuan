<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洛川</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --text: #1d1d1f;
    --subtext: #86868b;
    --accent: #0071e3;
    --border: #d2d2d7;
    --radius: 16px;
    --transition: 0.2s;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .app { max-width: 390px; margin: 0 auto; padding: 0 0 80px; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .menu-btn {
    width: 32px;
    height: 32px;
    border: none;
    background: transparent;
    font-size: 18px;
    cursor: pointer;
    color: var(--text);
  }

  /* Card */
  .card-wrap {
    padding: 20px;
  }
  .card {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    cursor: grab;
    user-select: none;
    transition: box-shadow 0.2s;
    box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.05);
  }
  .card:active { cursor: grabbing; }
  .card.is-dragging { transition: none; }
  .card.animating { transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.4s; }

  .card-img {
    width: 100%;
    height: 320px;
    background-size: cover;
    background-position: center;
  }

  .card-body {
    padding: 16px;
  }
  .card-source {
    font-size: 12px;
    color: var(--subtext);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .card-title {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 8px;
  }
  .card-summary {
    font-size: 14px;
    color: var(--subtext);
    line-height: 1.5;
  }

  /* Overlays */
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .overlay.like { background: rgba(0, 113, 227, 0.15); }
  .overlay.nope { background: rgba(237, 66, 69, 0.15); }
  .overlay span {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 4px;
    padding: 16px 32px;
    border-radius: 8px;
    border: 4px solid;
  }
  .overlay.like span { color: var(--accent); border-color: var(--accent); }
  .overlay.nope span { color: #ed4245; border-color: #ed4245; }

  /* Buttons */
  .actions {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 16px 0;
  }
  .btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid;
    background: #fff;
    cursor: pointer;
    font-size: 24px;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn:hover { transform: scale(1.1); }
  .btn.nope { color: #ed4245; border-color: #ed4245; }
  .btn.nope:hover { background: #ed4245; color: #fff; }
  .btn.like { color: #34c759; border-color: #34c759; }
  .btn.like:hover { background: #34c759; color: #fff; }

  /* List */
  .list { display: none; padding: 16px; }
  .list.show { display: block; }
  .list-item {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .list-item:last-child { border-bottom: none; }
  .list-item:hover .list-title { color: var(--accent); }
  .list-img {
    width: 72px;
    height: 72px;
    border-radius: 8px;
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
  }
  .list-content { flex: 1; min-width: 0; }
  .list-source {
    font-size: 11px;
    color: var(--subtext);
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .list-title {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.35;
    margin-bottom: 4px;
    transition: color 0.2s;
  }
  .list-meta {
    font-size: 12px;
    color: var(--subtext);
  }

  /* Mode Toggle */
  .mode-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .mode-btn {
    flex: 1;
    padding: 14px;
    border: none;
    background: transparent;
    font-size: 14px;
    font-weight: 500;
    color: var(--subtext);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: var(--transition);
  }
  .mode-btn.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }

  /* Empty */
  .empty {
    text-align: center;
    padding: 60px 20px;
  }
  .empty-icon { font-size: 48px; opacity: 0.3; margin-bottom: 12px; }
  .empty-text { font-size: 16px; color: var(--subtext); }

  /* Modal */
  .modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 1000;
    opacity: 0;
    visibility: hidden;
    transition: var(--transition);
  }
  .modal.show { opacity: 1; visibility: visible; }
  .modal-box {
    background: #fff;
    border-radius: var(--radius);
    padding: 32px;
    max-width: 340px;
    width: 100%;
    text-align: center;
    transform: scale(0.95);
    transition: var(--transition);
  }
  .modal.show .modal-box { transform: scale(1); }
  .modal-logo {
    width: 56px;
    height: 56px;
    background: var(--text);
    border-radius: 14px;
    color: #fff;
    font-size: 24px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }
  .modal-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .modal-desc { font-size: 14px; color: var(--subtext); margin-bottom: 24px; }
  .modal-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    margin-bottom: 8px;
  }
  .modal-btn:hover { opacity: 0.9; }
  .modal-skip {
    background: transparent;
    border: none;
    color: var(--subtext);
    font-size: 13px;
    cursor: pointer;
    padding: 8px;
  }

  /* Interests */
  .interests {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .interest {
    padding: 12px 8px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: transparent;
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--subtext);
    transition: var(--transition);
  }
  .interest:hover { border-color: var(--accent); color: var(--accent); }
  .interest.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
  .interest .icon { font-size: 20px; display: block; margin-bottom: 4px; }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="logo">洛川</div>
    <button class="menu-btn" onclick="showMenu()">☰</button>
  </header>

  <div class="mode-bar">
    <button class="mode-btn active" onclick="setMode('swipe')">滑动</button>
    <button class="mode-btn" onclick="setMode('list')">列表</button>
  </div>

  <div class="card-wrap" id="cardWrap">
    <div class="card" id="card">
      <div class="overlay like" id="overlayLike"><span>LIKE</span></div>
      <div class="overlay nope" id="overlayNope"><span>PASS</span></div>
      <div class="card-img" id="cardImg"></div>
      <div class="card-body">
        <div class="card-source" id="cardSource">来源</div>
        <div class="card-title" id="cardTitle">标题</div>
        <div class="card-summary" id="cardSummary">摘要</div>
      </div>
    </div>
  </div>

  <div class="actions" id="actions">
    <button class="btn nope" onclick="swipe('nope')">✕</button>
    <button class="btn like" onclick="swipe('like')">♥</button>
  </div>

  <div class="list" id="list"></div>
</div>

<!-- Onboarding -->
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-logo">洛</div>
    <div class="modal-title">欢迎使用洛川</div>
    <div class="modal-desc">发现值得关注的资讯</div>
    <div class="interests" id="interests">
      <div class="interest" data-v="money"><span class="icon">💰</span>赚钱</div>
      <div class="interest" data-v="ai"><span class="icon">🤖</span>AI</div>
      <div class="interest" data-v="career"><span class="icon">💼</span>职场</div>
      <div class="interest" data-v="tech"><span class="icon">🚀</span>科技</div>
      <div class="interest" data-v="trend"><span class="icon">🔮</span>趋势</div>
      <div class="interest" data-v="life"><span class="icon">🎯</span>生活</div>
    </div>
    <button class="modal-btn" onclick="startApp()">开始使用</button>
    <button class="modal-skip" onclick="skipOnboard()">稍后</button>
  </div>
</div>

<script>
const DATA_DIR = './data/';
let articles = [], index = 0, mode = 'swipe';
let prefs = {}, dragging = false, startX = 0, curX = 0;
let card, list;

const SOURCE_EMOJI = {
  '抖音': '🎵', 'B站': '📺', '36氪': '💰', '虎嗅': '🐯',
  '知乎': '💬', '机器之心': '🧠', '量子位': '⚛️'
};

function getTag(a) {
  const t = (a.title + a.summary + a.category).toLowerCase();
  if (/钱|赚|创业/.test(t)) return '赚钱';
  if (/ai|人工智能/.test(t)) return 'AI';
  if (/职场|工作/.test(t)) return '职场';
  if (/科技|技术/.test(t)) return '科技';
  if (/趋势|未来/.test(t)) return '趋势';
  return '生活';
}

function loadPrefs() {
  try { prefs = JSON.parse(localStorage.getItem('luo_prefs')) || {}; } 
  catch (e) { prefs = {}; }
}

function savePrefs() {
  localStorage.setItem('luo_prefs', JSON.stringify(prefs));
}

function init() {
  loadPrefs();
  card = document.getElementById('card');
  list = document.getElementById('list');
  
  if (!prefs.done) {
    showModal();
    loadData();
    return;
  }
  
  loadData();
  setupSwipe();
  showCard();
}

function showModal() {
  document.getElementById('modal').classList.add('show');
  document.querySelectorAll('.interest').forEach(el => {
    el.onclick = () => el.classList.toggle('selected');
  });
}

function startApp() {
  const selected = [...document.querySelectorAll('.interest.selected')].map(el => el.dataset.v);
  prefs = { done: true, interests: selected, liked: [], weights: {} };
  selected.forEach(v => prefs.weights[v] = 0.8);
  savePrefs();
  document.getElementById('modal').classList.remove('show');
}

function skipOnboard() {
  prefs = { done: true, interests: [], liked: [], weights: {} };
  savePrefs();
  document.getElementById('modal').classList.remove('show');
}

async function loadData() {
  try {
    const r = await fetch(DATA_DIR + 'index.json');
    const dates = (await r.json()).reverse();
    
    for (const d of dates.slice(0, 3)) {
      try {
        const r2 = await fetch(DATA_DIR + d.date + '.json');
        if (r2.ok) articles.push(...(await r2.json()).articles);
      } catch (e) {}
    }
  } catch (e) {}
  
  if (!articles.length) articles = getSample();
  shuffle(articles);
}

function getSample() {
  return [
    { title: '2026年最赚钱的6个副业方向', summary: 'AI内容创作、跨境电商、知识付费等热门方向', source: '36氪', image: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=800&h=600&fit=crop', region: '中国' },
    { title: 'AI时代，如何不被替代', summary: '尚未掌握AI技能的人才是真正危险的', source: '虎嗅', image: 'https://images.unsplash.com/photo-1677442136019-21780ecad995?w=800&h=600&fit=crop', region: '全球' },
    { title: '35岁之后的职业选择', summary: '一位40岁转型成功者的完整路径', source: '知乎', image: 'https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=800&h=600&fit=crop', region: '中国' },
    { title: '短视频创作者的变现指南', summary: '拆解头部博主的变现路径和方法论', source: 'B站', image: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=600&fit=crop', region: '中国' },
    { title: '特斯拉开源FSD技术', summary: '特斯拉宣布开源FSD，行业即将巨变', source: '机器之心', image: 'https://images.unsplash.com/photo-1516739698692-576384a8061d?w=800&h=600&fit=crop', region: '全球' },
    { title: '抖音带货新玩法', summary: '实测AI工具自动生成高质量带货视频', source: '抖音', image: 'https://images.unsplash.com/photo-1611162616305-c69b3fa7fbe0?w=800&h=600&fit=crop', region: '中国' },
    { title: '创业风口在哪里', summary: '深度分析当前创投趋势和百亿市场', source: '创业邦', image: 'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=800&h=600&fit=crop', region: '中国' },
    { title: '为什么存不下钱', summary: '行为心理学告诉你存钱困难的真相', source: '知乎', image: 'https://images.unsplash.com/photo-1517924194047-0440b560d937?w=800&h=600&fit=crop', region: '中国' }
  ];
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function setupSwipe() {
  card.addEventListener('mousedown', e => start(e));
  card.addEventListener('touchstart', e => start(e), { passive: false });
  document.addEventListener('mousemove', move);
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('mouseup', end);
  document.addEventListener('touchend', end);
}

function start(e) {
  dragging = true;
  const p = e.touches ? e.touches[0] : e;
  startX = p.clientX;
  card.classList.add('is-dragging');
  card.classList.remove('animating');
}

function move(e) {
  if (!dragging) return;
  e.preventDefault();
  const p = e.touches ? e.touches[0] : e;
  curX = p.clientX - startX;
  card.style.transform = `translateX(${curX}px) rotate(${curX * 0.04}deg)`;
  
  const like = document.getElementById('overlayLike');
  const nope = document.getElementById('overlayNope');
  
  if (curX > 50) {
    like.style.opacity = Math.min(curX / 100, 1);
    nope.style.opacity = 0;
  } else if (curX < -50) {
    nope.style.opacity = Math.min(Math.abs(curX) / 100, 1);
    like.style.opacity = 0;
  } else {
    like.style.opacity = nope.style.opacity = 0;
  }
}

function end() {
  if (!dragging) return;
  dragging = false;
  card.classList.remove('is-dragging');
  card.classList.add('animating');
  
  if (curX > 100) doSwipe('like');
  else if (curX < -100) doSwipe('nope');
  else resetCard();
}

function resetCard() {
  card.style.transform = 'translateX(0)';
  document.getElementById('overlayLike').style.opacity = 0;
  document.getElementById('overlayNope').style.opacity = 0;
}

function swipe(dir) {
  if (mode !== 'swipe') return;
  doSwipe(dir);
}

function doSwipe(dir) {
  const targetX = dir === 'like' ? window.innerWidth : -window.innerWidth;
  card.style.transform = `translateX(${targetX}px) rotate(${dir === 'like' ? 30 : -30}deg)`;
  card.style.opacity = '0';
  
  setTimeout(() => {
    const a = articles[index];
    const tag = getTag(a);
    
    if (dir === 'like') {
      prefs.liked.push({ id: a.title, tag });
      prefs.weights[tag] = Math.min((prefs.weights[tag] || 0.5) + 0.1, 1);
    } else {
      prefs.weights[tag] = Math.max((prefs.weights[tag] || 0.5) - 0.05, 0.1);
    }
    savePrefs();
    
    index++;
    card.style.opacity = '1';
    
    if (index >= articles.length) showEmpty();
    else showCard();
  }, 300);
}

function showCard() {
  if (index >= articles.length) { showEmpty(); return; }
  
  const a = articles[index];
  document.getElementById('cardImg').style.backgroundImage = `url(${a.image})`;
  document.getElementById('cardSource').textContent = (SOURCE_EMOJI[a.source] || '📰') + ' ' + a.source;
  document.getElementById('cardTitle').textContent = a.title;
  document.getElementById('cardSummary').textContent = a.summary;
  
  resetCard();
  
  card.onclick = () => {
    if (a.url && a.url !== '#') window.open(a.url, '_blank');
  };
}

function showEmpty() {
  document.getElementById('cardWrap').innerHTML = `
    <div class="empty">
      <div class="empty-icon">✓</div>
      <div class="empty-text">今日内容已浏览完毕</div>
    </div>
  `;
  document.getElementById('actions').style.display = 'none';
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.includes(m === 'swipe' ? '滑动' : '列表'));
  });
  
  if (m === 'swipe') {
    document.getElementById('cardWrap').style.display = 'block';
    document.getElementById('actions').style.display = 'flex';
    list.classList.remove('show');
  } else {
    document.getElementById('cardWrap').style.display = 'none';
    document.getElementById('actions').style.display = 'none';
    list.classList.add('show');
    renderList();
  }
}

function renderList() {
  list.innerHTML = articles.map(a => `
    <div class="list-item" onclick="${a.url ? `window.open('${a.url}', '_blank')` : ''}">
      <div class="list-img" style="background-image:url(${a.image})"></div>
      <div class="list-content">
        <div class="list-source">${a.source}</div>
        <div class="list-title">${a.title}</div>
        <div class="list-meta">${a.region || '全球'}</div>
      </div>
    </div>
  `).join('');
}

function showMenu() {
  alert('设置功能开发中...');
}

init();
</script>
</body>
</html>
