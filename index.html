<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>洛川 Luochuan</title>
<style>
/* 基础样式重置 */
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}

/* 定义可动画化的自定义属性 */
@property --bg-1 {
    syntax: '<color>';
    inherits: false;
    initial-value: #F2F4FA;
}
@property --bg-2 {
    syntax: '<color>';
    inherits: false;
    initial-value: #F8F3FC;
}
@property --bg-3 {
    syntax: '<color>';
    inherits: false;
    initial-value: #FCF5F3;
}

/* 全局变量 */
:root {
    --text-main: #1A1A1E;
    --text-secondary: #8E8E93;
    --text-placeholder: #48484D;
    --accent: #007AFF;
    --like-start: #34C759;
    --like-end: #30D158;
    --skip-start: #FF6B6B;
    --skip-end: #FF8A80;
    --glass-bg: rgba(255, 255, 255, 0.72);
    --glass-border: rgba(255, 255, 255, 0.5);
    --shadow-blur: rgba(0, 113, 227, 0.15);
    --radius-lg: 32px;
    --radius-md: 24px;
    --radius-sm: 16px;
    --ease: cubic-bezier(0.25, 0.1, 0.25, 1);
}

/* 基础设置 */
body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
}

/* 1. 动态流体背景 */
.bg-fluid {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: -2;
    background: 
        linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3)),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
    animation: bgFlow 25s ease-in-out infinite alternate;
}

/* 动态光斑 */
.bg-glow-1, .bg-glow-2 {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    z-index: -1;
    filter: blur(80px);
    pointer-events: none;
}
.bg-glow-1 {
    background: radial-gradient(circle, rgba(0,122,255,0.18) 0%, transparent 70%);
    animation: float1 28s ease-in-out infinite;
}
.bg-glow-2 {
    background: radial-gradient(circle, rgba(155,89,182,0.15) 0%, transparent 70%);
    animation: float2 32s ease-in-out infinite;
}

/* 背景流动动画 */
@keyframes bgFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
@keyframes float1 {
    0%, 100% { transform: translate(-100px, -50px); }
    50% { transform: translate(100px, 100px); }
}
@keyframes float2 {
    0%, 100% { transform: translate(200px, -100px); }
    50% { transform: translate(-150px, 80px); }
}

/* 应用容器 */
.app {
    position: relative;
    max-width: 414px;
    margin: 0 auto;
    padding: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* 2. 顶部 */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 20px 16px;
    z-index: 100;
}
.logo {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--text-main);
    opacity: 0.95;
}
.header-actions {
    display: flex;
    gap: 12px;
}
.icon-btn {
    width: 44px;
    height: 44px;
    border-radius: var(--radius-sm);
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px var(--shadow-blur);
}
.icon-btn:active {
    transform: scale(0.95);
}

/* 模式切换 */
.mode-switch {
    display: flex;
    gap: 8px;
    margin: 0 20px 20px;
    padding: 4px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
    box-shadow: 0 4px 24px var(--shadow-blur);
}
.mode-btn {
    flex: 1;
    padding: 12px;
    border: none;
    background: transparent;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    border-radius: 12px;
    transition: all var(--ease);
}
.mode-btn.active {
    background: rgba(255, 255, 255, 0.9);
    color: var(--text-main);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

/* 3. 卡片堆叠容器 */
.card-stack {
    flex: 1;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* 堆叠卡片样式 */
.stack-card {
    position: absolute;
    width: 340px;
    height: 480px;
    border-radius: var(--radius-lg);
    background: var(--glass-bg);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid var(--glass-border);
    box-shadow: 
        0 8px 32px rgba(0,113,227,0.12),
        inset 0 1px 0 rgba(255,255,255,0.5);
    cursor: grab;
    user-select: none;
    overflow: hidden;
    transition: transform 0.5s var(--ease), opacity 0.5s var(--ease);
}
.stack-card:active {
    cursor: grabbing;
}
.stack-card.dragging {
    transition: none;
}

/* 第二层和第三层堆叠效果 */
.stack-card:nth-child(2) {
    transform: scale(0.95) translateY(12px) rotate(1deg);
    opacity: 0.9;
    z-index: 9;
}
.stack-card:nth-child(3) {
    transform: scale(0.90) translateY(24px) rotate(-1deg);
    opacity: 0.8;
    z-index: 8;
}

/* 卡片内容 */
.card-inner {
    padding: 28px 24px;
    height: 100%;
    display: flex;
    flex-direction: column;
}
.card-image {
    width: 100%;
    height: 220px;
    border-radius: var(--radius-md);
    background-size: cover;
    background-position: center;
    margin-bottom: 20px;
    position: relative;
}
.card-image::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: var(--radius-md);
    background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.08));
}
.card-source {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
}
.card-title {
    font-size: 24px;
    font-weight: 590;
    line-height: 1.25;
    color: var(--text-main);
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
.card-summary {
    font-size: 15px;
    line-height: 1.5;
    color: var(--text-placeholder);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* 滑动时的情绪光感 */
.overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    border-radius: var(--radius-lg);
    transition: opacity 0.15s;
}
.overlay.like {
    background: radial-gradient(circle, rgba(52,199,89,0.18) 0%, transparent 70%);
}
.overlay.skip {
    background: radial-gradient(circle, rgba(255,107,107,0.18) 0%, transparent 70%);
}
.overlay-icon {
    font-size: 72px;
    font-weight: 800;
    transform: rotate(-12deg);
    opacity: 0.9;
}
.overlay.like .overlay-icon {
    color: var(--like-end);
}
.overlay.skip .overlay-icon {
    color: var(--skip-end);
}

/* 4. 底部按钮 */
.action-buttons {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 16px 0 36px;
}
.action-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    box-shadow: 0 6px 24px rgba(0,113,227,0.12);
    transition: transform 0.15s, box-shadow 0.2s;
}
.action-btn:active {
    transform: scale(0.95);
}
.action-btn.skip {
    color: var(--skip-end);
}
.action-btn.info {
    color: var(--accent);
}
.action-btn.like {
    color: var(--like-end);
}
.action-btn.like:active {
    background: linear-gradient(135deg, var(--like-start), var(--like-end));
    color: white;
}
.action-btn.skip:active {
    background: linear-gradient(135deg, var(--skip-start), var(--skip-end));
    color: white;
}

/* 5. 列表模式 */
.list-view {
    display: none;
    padding: 0 20px 100px;
    flex: 1;
    overflow-y: auto;
}
.list-view.show {
    display: block;
}
.list-item {
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-md);
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    gap: 16px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}
.list-item:active {
    transform: scale(0.98);
}
.list-img {
    width: 96px;
    height: 72px;
    border-radius: var(--radius-sm);
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
}
.list-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.list-source {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
}
.list-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-main);
    line-height: 1.4;
}

/* 6. 引导弹窗 */
.modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 1000;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s var(--ease);
}
.modal.show {
    opacity: 1;
    visibility: visible;
}
.modal-content {
    background: var(--glass-bg);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    padding: 36px 28px 28px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 24px 80px rgba(0,0,0,0.15);
    transform: scale(0.95);
    transition: transform 0.3s var(--ease);
}
.modal.show .modal-content {
    transform: scale(1);
}
.modal-logo {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--accent), #5856D6);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 26px;
    font-weight: 700;
    margin: 0 auto 16px;
}
.modal-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 8px;
}
.modal-desc {
    font-size: 15px;
    color: var(--text-secondary);
    margin-bottom: 24px;
    line-height: 1.5;
}

/* 兴趣标签网格 */
.interests-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 28px;
}
.interest-tag {
    padding: 14px 8px;
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.5);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    transition: all 0.2s var(--ease);
    position: relative;
    overflow: hidden;
}
.interest-tag .emoji {
    font-size: 20px;
    display: block;
    margin-bottom: 4px;
}
.interest-tag.selected {
    background: var(--accent);
    color: white;
    border-color: transparent;
}
.interest-tag.selected::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 10px;
    height: 10px;
    background: white;
    border-radius: 50%;
    animation: ripple 0.4s ease-out;
}
@keyframes ripple {
    from { transform: translate(-50%, -50%) scale(0); opacity: 0.8; }
    to { transform: translate(-50%, -50%) scale(12); opacity: 0; }
}

/* 按钮 */
.btn-primary {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: var(--radius-md);
    background: linear-gradient(135deg, var(--accent), #5856D6);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 6px 20px rgba(0,122,255,0.3);
}
.btn-primary:active {
    transform: scale(0.97);
}
.btn-secondary {
    width: 100%;
    padding: 12px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    margin-top: 8px;
}

/* 无卡片状态 */
.empty-state {
    text-align: center;
    padding: 40px 20px;
}
.empty-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
}
.dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-secondary);
    opacity: 0.3;
    animation: breathe 2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.3s; }
.dot:nth-child(3) { animation-delay: 0.6s; }
@keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.25); opacity: 0.7; }
}
.empty-text {
    font-size: 15px;
    color: var(--text-secondary);
}
</style>
</head>
<body>

<div class="bg-fluid"></div>
<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>

<div class="app">
  <header class="header">
    <div class="logo">洛川</div>
    <div class="header-actions">
      <button class="icon-btn" onclick="showMenu()">⚙</button>
    </div>
  </header>

  <div class="mode-switch" id="modeSwitch">
    <button class="mode-btn active" onclick="setMode('swipe')">滑动浏览</button>
    <button class="mode-btn" onclick="setMode('list')">列表</button>
  </div>

  <div class="card-stack" id="cardStack"></div>

  <div class="action-buttons" id="actionBtns">
    <button class="action-btn skip" onclick="handleAction('skip')">✕</button>
    <button class="action-btn info" onclick="handleAction('info')">i</button>
    <button class="action-btn like" onclick="handleAction('like')">♥</button>
  </div>

  <div class="list-view" id="listView"></div>
</div>

<div class="modal" id="welcomeModal">
  <div class="modal-content">
    <div class="modal-logo">洛</div>
    <h2 class="modal-title">欢迎使用洛川</h2>
    <p class="modal-desc">发现值得关注的资讯，让每一次滑动都充满惊喜。</p>
    
    <div class="interests-grid" id="interests">
      <div class="interest-tag" data-interest="money">
        <span class="emoji">💰</span>
        赚钱创业
      </div>
      <div class="interest-tag" data-interest="ai">
        <span class="emoji">🤖</span>
        AI科技
      </div>
      <div class="interest-tag" data-interest="career">
        <span class="emoji">💼</span>
        职场发展
      </div>
      <div class="interest-tag" data-interest="trend">
        <span class="emoji">🔮</span>
        前沿趋势
      </div>
      <div class="interest-tag" data-interest="life">
        <span class="emoji">🎯</span>
        生活方式
      </div>
      <div class="interest-tag" data-interest="design">
        <span class="emoji">✨</span>
        设计艺术
      </div>
    </div>
    
    <button class="btn-primary" onclick="startUsing()">开始使用</button>
    <button class="btn-secondary" onclick="skipWelcome()">稍后再说</button>
  </div>
</div>

<script>
const DATA_DIR = './data/';
let articles = [], currentIndex = 0, mode = 'swipe';
let prefs = {}, isDragging = false, startX = 0, curX = 0, curY = 0;
let activeCard = null;

const SOURCE_EMOJI = {
  '抖音': '🎵', 'B站': '📺', '36氪': '💰', '虎嗅': '🐯',
  '知乎': '💬', '机器之心': '🧠', '量子位': '⚛️'
};

function getTag(a) {
  const t = (a.title + a.summary + (a.category || '')).toLowerCase();
  if (/钱|赚|创业/.test(t)) return 'money';
  if (/ai|人工智能/.test(t)) return 'ai';
  if (/职场|工作/.test(t)) return 'career';
  if (/趋势|未来/.test(t)) return 'trend';
  return 'tech';
}

function loadPrefs() {
  try {
    prefs = JSON.parse(localStorage.getItem('luo_prefs')) || {};
  } catch (e) { prefs = {}; }
}

function savePrefs() {
  localStorage.setItem('luo_prefs', JSON.stringify(prefs));
}

function getSourceEmoji(source) {
  return SOURCE_EMOJI[source] || '📰';
}

function init() {
  loadPrefs();
  
  if (!prefs.done) {
    loadData();
    document.getElementById('welcomeModal').classList.add('show');
    setupInterests();
  } else {
    loadData();
  }
}

function setupInterests() {
  document.querySelectorAll('.interest-tag').forEach(tag => {
    tag.addEventListener('click', () => tag.classList.toggle('selected'));
  });
}

function startUsing() {
  const selected = [...document.querySelectorAll('.interest-tag.selected')].map(el => el.dataset.interest);
  
  prefs.done = true;
  prefs.interests = selected;
  prefs.liked = prefs.liked || [];
  prefs.weights = prefs.weights || {};
  selected.forEach(v => prefs.weights[v] = 0.8);
  
  savePrefs();
  document.getElementById('welcomeModal').classList.remove('show');
}

function skipWelcome() {
  prefs.done = true;
  prefs.liked = prefs.liked || [];
  prefs.weights = prefs.weights || {};
  
  savePrefs();
  document.getElementById('welcomeModal').classList.remove('show');
}

async function loadData() {
  try {
    const r = await fetch(DATA_DIR + 'index.json');
    const dates = (await r.json()).reverse();
    
    for (const d of dates.slice(0, 3)) {
      try {
        const r2 = await fetch(DATA_DIR + d.date + '.json');
        if (r2.ok) {
          articles.push(...(await r2.json()).articles);
        }
      } catch (e) {}
    }
  } catch (e) {}
  
  if (!articles.length) {
    articles = getSample();
  }
  
  shuffle(articles);
  renderStack();
  renderListView();
}

function getSample() {
  return [
    { id: 1, title: '2026年值得关注的6个副业方向', summary: 'AI内容创作、跨境电商、知识付费等多个赛道的深度分析', source: '36氪', image: 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800&h=600&fit=crop', category: 'money', region: '中国' },
    { id: 2, title: 'AI时代，如何不被替代', summary: '未来真正危险的并不是AI，而是那些尚未掌握AI协作技能的人', source: '虎嗅', image: 'https://images.unsplash.com/photo-1677442136019-21780ecad995?w=800&h=600&fit=crop', category: 'ai', region: '全球' },
    { id: 3, title: '35岁之后的职业选择', summary: '分享一位40岁转型成功者的经验，从被裁员到找到新赛道的完整路径', source: '知乎', image: 'https://images.unsplash.com/photo-1521791055366-0d553872125f?w=800&h=600&fit=crop', category: 'career', region: '中国' },
    { id: 4, title: '短视频创作者的变现指南', summary: '拆解头部知识博主的变现路径，从定位到内容策略的完整方法论', source: 'B站', image: 'https://images.unsplash.com/photo-1611162616475-46b635cb6868?w=800&h=600&fit=crop', category: 'trend', region: '中国' }
  ];
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function renderStack() {
  const stack = document.getElementById('cardStack');
  stack.innerHTML = '';
  
  if (currentIndex >= articles.length) {
    stack.innerHTML = `
      <div class="empty-state">
        <div class="empty-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <p class="empty-text">今日内容已浏览完毕<br>明天会有新内容哦～</p>
      </div>
    `;
    document.getElementById('actionBtns').style.display = 'none';
    return;
  }
  
  document.getElementById('actionBtns').style.display = 'flex';
  
  for (let i = 2; i >= 0; i--) {
    const idx = currentIndex + i;
    if (idx >= articles.length) continue;
    
    const card = createCard(articles[idx], i === 0);
    stack.appendChild(card);
    
    if (i === 0) {
      activeCard = card;
      setupDrag(card);
    }
  }
}

function createCard(a, isTop) {
  const div = document.createElement('div');
  div.className = 'stack-card';
  if (isTop) div.style.zIndex = '10';
  
  div.innerHTML = `
    <div class="overlay like">
      <span class="overlay-icon">♥</span>
    </div>
    <div class="overlay skip">
      <span class="overlay-icon">✕</span>
    </div>
    <div class="card-inner">
      <div class="card-image" style="background-image:url('${a.image}')"></div>
      <div class="card-source">
        <span>${getSourceEmoji(a.source)}</span>
        <span>${a.source}</span>
        <span style="margin-left:auto;opacity:0.6;">刚刚</span>
      </div>
      <h3 class="card-title">${a.title}</h3>
      <p class="card-summary">${a.summary}</p>
    </div>
  `;
  
  return div;
}

function setupDrag(card) {
  card.addEventListener('mousedown', dragStart);
  card.addEventListener('touchstart', dragStart, { passive: false });
  
  document.addEventListener('mousemove', dragMove);
  document.addEventListener('touchmove', dragMove, { passive: false });
  
  document.addEventListener('mouseup', dragEnd);
  document.addEventListener('touchend', dragEnd);
}

function dragStart(e) {
  if (!activeCard) return;
  
  isDragging = true;
  const p = e.touches ? e.touches[0] : e;
  startX = p.clientX;
  curX = 0;
  curY = 0;
  
  activeCard.classList.add('dragging');
}

function dragMove(e) {
  if (!isDragging || !activeCard) return;
  e.preventDefault();
  
  const p = e.touches ? e.touches[0] : e;
  curX = p.clientX - startX;
  curY = (e.touches ? e.touches[0].clientY : e.clientY) - (e.touches ? startY : startY);
  
  const rotate = curX * 0.04;
  activeCard.style.transform = `translate(${curX}px, ${curY}px) rotate(${rotate}deg)`;
  
  const like = activeCard.querySelector('.overlay.like');
  const skip = activeCard.querySelector('.overlay.skip');
  
  if (curX > 50) {
    like.style.opacity = Math.min(curX / 150, 1);
    skip.style.opacity = 0;
  } else if (curX < -50) {
    skip.style.opacity = Math.min(Math.abs(curX) / 150, 1);
    like.style.opacity = 0;
  } else {
    like.style.opacity = skip.style.opacity = 0;
  }
}

function dragEnd() {
  if (!isDragging || !activeCard) return;
  isDragging = false;
  activeCard.classList.remove('dragging');
  
  const threshold = window.innerWidth * 0.3;
  
  if (curX > threshold) {
    flyAway('like');
  } else if (curX < -threshold) {
    flyAway('skip');
  } else {
    snapBack();
  }
}

function snapBack() {
  if (!activeCard) return;
  
  activeCard.style.transform = '';
  activeCard.querySelector('.overlay.like').style.opacity = '0';
  activeCard.querySelector('.overlay.skip').style.opacity = '0';
}

function flyAway(action) {
  if (!activeCard) return;
  
  const targetX = action === 'like' ? window.innerWidth + 100 : -window.innerWidth - 100;
  const rotate = action === 'like' ? 20 : -20;
  
  activeCard.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.3s';
  activeCard.style.transform = `translate(${targetX}px, ${curY}px) rotate(${rotate}deg)`;
  activeCard.style.opacity = '0';
  
  if (navigator.vibrate) navigator.vibrate(10);
  
  setTimeout(() => {
    const a = articles[currentIndex];
    const tag = getTag(a);
    
    if (action === 'like') {
      prefs.liked.push({ id: a.id || a.title, tag });
      prefs.weights[tag] = Math.min((prefs.weights[tag] || 0.5) + 0.1, 1);
    } else {
      prefs.weights[tag] = Math.max((prefs.weights[tag] || 0.5) - 0.05, 0.1);
    }
    savePrefs();
    
    currentIndex++;
    activeCard = null;
    renderStack();
  }, 350);
}

function handleAction(action) {
  if (mode !== 'swipe' || currentIndex >= articles.length) return;
  
  if (action === 'like' || action === 'skip') {
    curX = action === 'like' ? 200 : -200;
    flyAway(action);
  } else if (action === 'info') {
    const a = articles[currentIndex];
    if (a && a.url && a.url !== '#') {
      window.open(a.url, '_blank');
    } else {
      alert('详细内容开发中...');
    }
  }
}

function setMode(m) {
  mode = m;
  
  document.querySelectorAll('.mode-btn').forEach((btn, i) => {
    btn.classList.toggle('active', 
      (m === 'swipe' && i === 0) || (m === 'list' && i === 1));
  });
  
  document.getElementById('cardStack').style.display = m === 'swipe' ? 'flex' : 'none';
  document.getElementById('actionBtns').style.display = m === 'swipe' ? 'flex' : 'none';
  document.getElementById('listView').classList.toggle('show', m === 'list');
}

function renderListView() {
  const list = document.getElementById('listView');
  list.innerHTML = articles.map(a => `
    <div class="list-item" onclick="${a.url && a.url !== '#' ? `window.open('${a.url}', '_blank')` : ''}">
      <div class="list-img" style="background-image:url('${a.image}')"></div>
      <div class="list-content">
        <div class="list-source">${getSourceEmoji(a.source)} ${a.source}</div>
        <div class="list-title">${a.title}</div>
      </div>
    </div>
  `).join('');
}

function showMenu() {
  alert('设置功能开发中...');
}

let startY = 0;
document.addEventListener('touchstart', e => {
  startY = e.touches[0].clientY;
}, { passive: true });

init();
</script>
</body>
</html>
